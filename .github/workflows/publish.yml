name: Publish Package to npmjs
on:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
        continue-on-error: false

      - run: npm run build
        continue-on-error: false

      - name: Generate oobee-client-scanner.js
        run: node dist/generateOobeeClientScanner.js

      - name: Commit generated client scanner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oobee-client-scanner.js
          git diff --cached --quiet || git commit -m "chore: regenerate oobee-client-scanner.js"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create and push git tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -af "v${VERSION}" -m "Version ${VERSION}"
          git push origin "v${VERSION}" --force
          git tag -af "latest" -m "Latest release ${VERSION}"
          git push origin "latest" --force

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
