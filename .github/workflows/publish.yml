name: Publish Package to npmjs
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag or ref to publish (e.g. 0.11.4). The commit at this ref will be built and published; its package.json version is what lands on npm.'
        required: true
        type: string
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ inputs.release_tag }}
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
        continue-on-error: false

      - run: npm run build
        continue-on-error: false

      - name: Generate oobee-client-scanner.js
        run: node dist/generateOobeeClientScanner.js

      - name: Create and push git tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -af "${VERSION}" -m "Version ${VERSION}"
          git push origin "${VERSION}" --force
          git tag -af "latest" -m "Latest release ${VERSION}"
          git push origin "latest" --force

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
